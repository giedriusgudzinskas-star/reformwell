<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <title>Reformwell — program</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{
      --primary:#0E7C86; --primary-dark:#0A5B63; --accent:#E8A33D;
      --text:#13202A; --muted:#5B6B73; --border:#DCE4E5; --bg:#F6F8F8; --tint:#E7F1F2;
    }
    *{ box-sizing:border-box; }
    @page{ size:A4; margin:16mm 15mm 20mm; }
    html,body{ margin:0; padding:0; }
    body{
      font-family:'Inter',system-ui,sans-serif; color:var(--text); font-size:11.5px; line-height:1.55;
      -webkit-print-color-adjust:exact; print-color-adjust:exact;
    }
    h1,h2,h3,h4{ font-family:'Sora',sans-serif; margin:0; line-height:1.2; }
    p{ margin:0 0 8px; }
    .wrap{ max-width:760px; margin:0 auto; }

    /* Cover */
    .cover{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff;
      border-radius:14px; padding:30px 32px; margin-bottom:22px;
    }
    .brand{ display:flex; align-items:center; gap:9px; font-family:'Sora'; font-weight:700; font-size:16px; letter-spacing:.2px; }
    .brand .mk{ width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.18); display:grid;place-items:center; }
    .cover .kind{ display:inline-block; margin-top:18px; font-size:10px; letter-spacing:.09em; text-transform:uppercase; background:rgba(255,255,255,.18); padding:4px 10px; border-radius:999px; }
    .cover h1{ font-size:27px; margin:10px 0 4px; }
    .cover .sub{ opacity:.92; font-size:12.5px; }
    .cover .meta{ display:flex; flex-wrap:wrap; gap:8px 18px; margin-top:16px; font-size:11px; }
    .cover .meta b{ font-weight:600; }

    .section{ margin:0 0 16px; }
    .eyebrow{ font-family:'Sora'; font-weight:700; font-size:13px; color:var(--primary-dark); margin:0 0 7px; padding-bottom:5px; border-bottom:2px solid var(--tint); }
    ul.clean{ margin:0; padding-left:18px; }
    ul.clean li{ margin:3px 0; }

    .box{ background:var(--bg); border-radius:10px; padding:13px 15px; margin:10px 0; }
    .box.warn{ background:#FFF8EC; border-left:3px solid var(--accent); }
    .box h4{ font-size:12px; margin:0 0 5px; }

    .phase{ border:1px solid var(--border); border-radius:11px; padding:18px 20px; margin:0 0 16px; }
    .phase-h{ display:flex; align-items:baseline; gap:9px; margin-bottom:4px; page-break-after:avoid; }
    .phase-h h3{ font-size:14px; }
    .phase-h .wk{ font-size:10px; color:var(--primary-dark); background:var(--tint); padding:2px 8px; border-radius:999px; font-weight:600; }
    .phase .focus{ color:var(--muted); font-size:11px; margin-bottom:10px; }
    .ex{ border-top:1px solid var(--border); padding:16px 0; page-break-inside:avoid; display:flex; gap:20px; align-items:flex-start; }
    .ex:first-of-type{ border-top:0; padding-top:6px; }
    .ex-thumb{ flex:0 0 130px; width:130px; height:130px; border-radius:10px; overflow:hidden; background:var(--tint); border:1px solid var(--border); }
    .ex-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
    .ex-body{ flex:1; min-width:0; }
    .ex-name{ font-family:'Sora'; font-weight:600; font-size:12.5px; line-height:1.3; margin-bottom:4px; }
    .ex-dose{ font-size:10.5px; color:var(--primary-dark); font-weight:600; line-height:1.45; margin-bottom:10px; }
    .ex p{ margin:7px 0 0; font-size:11px; line-height:1.6; }
    .ex p:first-of-type{ margin-top:0; }
    .ex .why{ color:var(--muted); }
    .lbl{ font-weight:700; color:var(--text); margin-right:4px; }

    /* tracker */
    table.track{ width:100%; border-collapse:collapse; margin-top:6px; font-size:10.5px; }
    table.track th, table.track td{ border:1px solid var(--border); padding:6px 8px; text-align:center; }
    table.track th{ background:var(--tint); font-family:'Sora'; font-weight:600; }
    table.track td.day{ text-align:left; color:var(--muted); }

    .disclaimer{ margin-top:20px; padding-top:12px; border-top:1px solid var(--border); color:var(--muted); font-size:9.5px; }
    .pagebreak{ page-break-before:always; }
  </style>
</head>
<body>
  <div class="wrap" id="root"></div>
  <script src="data.js"></script>
  <script>
    (function(){
      function qp(n){ var m=new RegExp("[?&]"+n+"=([^&]+)").exec(location.search); return m?decodeURIComponent(m[1]):null; }
      function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
      // Image filename from exercise name — keep identical to assets/exercises/ slugs.
      function exSlug(name){ return String(name==null?"":name).toLowerCase().replace(/&/g," and ").replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,""); }
      // Thumbnail; if the picture isn't generated yet it hides itself and the text reflows full width.
      function thumb(e){ var slug=(e&&e.img)?e.img:exSlug(e&&e.name?e.name:e); return '<div class="ex-thumb"><img src="assets/exercises/'+esc(slug)+'.jpg" onerror="this.style.display=\'none\'"></div>'; }
      var D=window.SITE_DATA||{}, slug=qp("slug"), kind=qp("kind")||"short";
      var conds=D.conditions||[], biz=D.business||{}, safety=D.safety||{};
      var c=conds.filter(function(x){return x.slug===slug;})[0];
      var root=document.getElementById("root");
      if(!c){ root.innerHTML="<p>Programa nerasta: "+esc(slug)+"</p>"; return; }
      var p = kind==="long" ? c.longProgram : c.shortProgram;
      var saf=(safety.perCondition||[]).filter(function(s){return s.slug===slug;})[0]||{};

      function list(arr){ if(!arr||!arr.length) return ""; return '<ul class="clean">'+arr.map(function(x){return "<li>"+esc(x)+"</li>";}).join("")+"</ul>"; }

      var meta=[];
      if(p.durationWeeks) meta.push("<span><b>Trukmė:</b> "+esc(p.durationWeeks)+"</span>");
      if(p.sessionsPerWeek) meta.push("<span><b>Dažnis:</b> "+esc(p.sessionsPerWeek)+"</span>");
      if(p.timePerSession) meta.push("<span><b>Vienam užsiėmimui:</b> "+esc(p.timePerSession)+"</span>");

      var phases=(p.phases||[]).map(function(ph){
        var exs=(ph.exercises||[]).map(function(e){
          var dose=[e.sets?e.sets+" serijos":"", e.reps?"× "+e.reps:"", e.tempoOrHold?"· "+e.tempoOrHold:""].filter(Boolean).join(" ");
          return '<div class="ex">'+thumb(e)+'<div class="ex-body">'+
            '<div class="ex-name">'+esc(e.name)+'</div>'+
            (dose?'<div class="ex-dose">'+esc(dose)+'</div>':'')+
            '<p><span class="lbl">Kaip:</span> '+esc(e.cues)+'</p>'+
            (e.progression?'<p><span class="lbl">Pažanga:</span> '+esc(e.progression)+'</p>':'')+
            (e.why?'<p class="why"><span class="lbl">Kodėl:</span> '+esc(e.why)+'</p>':'')+
            '</div></div>';
        }).join("");
        return '<div class="phase"><div class="phase-h"><h3>'+esc(ph.name)+'</h3>'+(ph.weeks?'<span class="wk">'+esc(ph.weeks)+'</span>':'')+'</div>'+
          '<div class="focus">'+esc(ph.focus)+'</div>'+exs+'</div>';
      }).join("");

      // simple 6-week tracker
      var rows="";
      for(var w=1; w<=6; w++){
        rows+='<tr><td class="day">'+w+' savaitė</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>';
      }
      var tracker='<table class="track"><tr><th style="text-align:left">Savaitė</th><th>Pr</th><th>An</th><th>Tr</th><th>Kt</th><th>Pn</th><th>Št</th><th>Sk</th></tr>'+rows+'</table>';

      root.innerHTML=
        '<div class="cover">'+
          '<div class="brand">Reformwell</div>'+
          '<span class="kind">'+(kind==="long"?"Pilnos reabilitacijos ir atsparumo programa":"Palengvinimo ir atstatymo programa")+'</span>'+
          '<h1>'+esc(p.name)+'</h1>'+
          '<div class="sub">'+esc(c.name)+'</div>'+
          '<div class="meta">'+meta.join("")+'</div>'+
        '</div>'+

        (p.goal?'<div class="section"><div class="box"><b>Tikslas:</b> '+esc(p.goal)+'</div></div>':'')+

        '<div class="section"><h2 class="eyebrow">Apie šią būklę</h2><p>'+esc(c.overview)+'</p></div>'+

        (c.whoIsThisFor?'<div class="section"><h2 class="eyebrow">Kam skirta ši programa</h2>'+list(c.whoIsThisFor)+'</div>':'')+

        (c.seeADoctorIf?'<div class="box warn"><h4>Pirmiausia kreipkitės į specialistą, jei…</h4>'+list(c.seeADoctorIf)+'</div>':'')+
        (saf.safetyNote?'<div class="box warn"><h4>Saugumo pastaba</h4><p>'+esc(saf.safetyNote)+'</p></div>':'')+

        '<div class="section pagebreak"><h2 class="eyebrow">Jūsų programa</h2>'+phases+'</div>'+

        ((p.education&&p.education.length)?'<div class="section"><h2 class="eyebrow">Savipriežiūros patarimai</h2>'+list(p.education)+'</div>':'')+
        (c.expectedOutcomes?'<div class="section"><h2 class="eyebrow">Ko tikėtis</h2>'+list(c.expectedOutcomes)+'</div>':'')+

        '<div class="section"><h2 class="eyebrow">Pažangos sekiklis</h2><p style="color:var(--muted)">Pažymėkite kiekvieną dieną, kai atliekate užsiėmimą.</p>'+tracker+'</div>'+

        '<div class="disclaimer">'+esc(safety.globalDisclaimer||biz.medicalDisclaimer||"")+'</div>';

      document.title="Reformwell — "+p.name;
    })();
  </script>
</body>
</html>
